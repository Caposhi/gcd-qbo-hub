# GCD QBO Hub on Render — a Next.js web service, a managed Postgres database,
# and a separate Cron Job that calls the protected internal sync route once a
# day. No Redis/BullMQ: a daily sync doesn't need a job queue (§1).
#
# New → Blueprint → connect caposhi/gcd-qbo-hub → pick the branch. Render reads
# this file and creates the services. Secrets marked `sync: false` are entered
# by hand in the dashboard (they are never in git).
services:
  # ---- Web service: the dashboard hub + /console/* + internal API routes ----
  - type: web
    name: gcd-qbo-hub
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm install && npm run build && npm run prisma:migrate
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: PUBLIC_APP_URL
        value: https://gcd-qbo-hub.onrender.com
      - key: NEXTAUTH_URL
        value: https://gcd-qbo-hub.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: gcd-qbo-hub-db
          property: connectionString
      # --- secrets (entered in the Render dashboard) ---
      - key: APP_ENCRYPTION_KEY
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: CONSOLE_TOKEN
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: BOOTSTRAP_OWNER_EMAIL
        value: michaelc@germancardepot.com
      - key: ALLOWED_EMAIL_DOMAINS
        value: germancardepot.com
      # --- Google Sheets ---
      - key: GOOGLE_SHEET_ID
        value: 1NGz6sOiJtKOOBZYpM5_0ODZxgHkSQRWYZQqufpotTWA
      - key: GOOGLE_SERVICE_ACCOUNT_JSON_BASE64
        sync: false
      # --- QBO ---
      # NOTE: QBO_ENV is LEGACY and no longer authoritative. The QBO environment
      # (sandbox vs live) is derived from the rollout stage (§12) — the single
      # source of truth used by the connect flow, the posting engine, and every
      # read-only page. This var is kept only for back-compat/diagnostics.
      - key: QBO_ENV
        value: sandbox
      - key: QBO_CLIENT_ID
        sync: false
      - key: QBO_CLIENT_SECRET
        sync: false
      - key: QBO_REDIRECT_URI
        value: https://gcd-qbo-hub.onrender.com/api/qbo/callback
      - key: QBO_REALM_ID
        sync: false
      # --- AI Report Assistant (prototype) + AI C-suite (Phase 3) ---
      - key: ANTHROPIC_API_KEY
        sync: false
      # --- Tekmetric integration (read-only shop-management data) ---
      - key: TEKMETRIC_BASE_URL
        value: https://shop.tekmetric.com
      - key: TEKMETRIC_TOKEN
        sync: false
      - key: TEKMETRIC_SHOP_ID
        sync: false
      # --- Coworker Portal "Ask My Client" import (read-only over QBO) ---
      - key: COWORKER_QBO_ACCOUNT_NAME
        value: Ask My Client
      # --- Call-transcript service (read-only aggregated insights) ---
      - key: TRANSCRIPTS_BASE_URL
        value: https://gcd-webhook-server.onrender.com
      - key: TRANSCRIPTS_SECRET
        sync: false
      # --- SendGrid ---
      - key: SENDGRID_API_KEY
        sync: false
      - key: ALERT_FROM_EMAIL
        value: alerts@germancardepot.com
      - key: ALERT_SUMMARY_RECIPIENT
        value: bills@germancardepot.com
      - key: ALERT_CRITICAL_RECIPIENT
        value: michaelc@germancardepot.com
      - key: SYNC_TZ
        value: America/New_York

  # ---- Cron Job: fires the daily sync at end of business day (19:00 ET). ----
  # Render cron runs in UTC; 19:00 America/New_York = 23:00 UTC (EDT) / 00:00
  # UTC (EST). We schedule 23:00 UTC and the route itself is idempotent, so an
  # off-by-one-hour DST shift only changes the wall-clock minute, never doubles
  # a post. Adjust here if you standardize on EST. Runs every day incl. weekends.
  - type: cron
    name: gcd-qbo-hub-daily-sync
    runtime: node
    plan: starter
    rootDir: .
    schedule: "0 23 * * *"
    buildCommand: npm install
    # Calls the protected internal route with the shared CRON_SECRET. The route
    # decides the mode/stage from the DB config, so the cron command never needs
    # to know whether we're in dry-run, sandbox, or live.
    startCommand: >-
      curl -fsS -X POST "$PUBLIC_APP_URL/api/cron/sync"
      -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: PUBLIC_APP_URL
        value: https://gcd-qbo-hub.onrender.com
      - key: CRON_SECRET
        sync: false

  # ---- Cron Job: monthly AI council run on the 1st (06:00 UTC) for the prior
  # month (Financial Projections, Phase 3). Calls the protected internal route;
  # the orchestrator enforces the $15/run token budget and is read-only over QBO.
  - type: cron
    name: gcd-qbo-hub-monthly-ai-council
    runtime: node
    plan: starter
    rootDir: .
    schedule: "0 6 1 * *"
    buildCommand: npm install
    startCommand: >-
      curl -fsS -X POST "$PUBLIC_APP_URL/api/cron/ai-council"
      -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: PUBLIC_APP_URL
        value: https://gcd-qbo-hub.onrender.com
      - key: CRON_SECRET
        sync: false

databases:
  - name: gcd-qbo-hub-db
    plan: basic-256mb
    postgresMajorVersion: "16"
